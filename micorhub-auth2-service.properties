# Server Configuration
server.port=8080

# Client Service URL
client.service.url=http://localhost:8081

# Timeout configuration
client.service.timeout=5000

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/

# Optional: Connection timeout
spring.rabbitmq.connection-timeout=5000

# Queue names
rabbitmq.queue.user-login=user.login.queue
rabbitmq.exchange.user-events=user.events
rabbitmq.routing-key.user-login=user.login

# Logging pour debug
logging.level.com.microfinancehub.micorhub_auth2_service.client=DEBUG

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# Datasource Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/microfinance_auth2
spring.datasource.username=postgres
spring.datasource.password=okomothom-96
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Management Endpoints
management.endpoints.web.exposure.include=health,info,metrics

# Logging Configuration
logging.level.com.microfinancehub.auth=DEBUG
logging.level.org.springframework.security=INFO

# # Désactiver RabbitMQ
