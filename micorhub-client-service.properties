# Server Configuration
server.port=8081

auth.service.url=http://localhost:8080

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/microfinance_client
spring.datasource.username=postgres
spring.datasource.password=okomothom-96
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/

# Optional: Connection timeout
spring.rabbitmq.connection-timeout=5000

# Queue names
rabbitmq.queue.user-login=user.login.queue
rabbitmq.exchange.user-events=user.events
rabbitmq.routing-key.user-login=user.login

# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# Management Endpoints
management.endpoints.web.exposure.include=health,info,metrics

# Logging
logging.level.com.microfinancehub.client=DEBUG
logging.level.org.springframework.security=INFO

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=5000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

logging.level.io.lettuce.core=DEBUG
logging.level.org.springframework.data.redis=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG